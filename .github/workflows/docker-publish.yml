name: Publish runtime image to GHCR

# Builds the LEAN, fully-offline runtime image (.devcontainer/build/Dockerfile) and pushes it to
# GHCR on a version tag. Uses the Actions-provided GITHUB_TOKEN (packages: write) — no personal PAT.
#
# ⚠️ CAVEAT — verify before relying on CI: the runtime image bakes the 5 wf-clone-validation SIFs by
# running `apptainer pull` INSIDE the Docker build. SIF *creation* (mksquashfs) needs userns but not
# /dev/fuse, so it MAY work on a GH-hosted runner — but this is unverified. If the build fails to pull
# SIFs, the fallback is to build lean on a host (where it's validated) and `docker push` once with a
# PAT that has write:packages. The free-disk-space step below is required: the image (~7 GB) + the
# in-build OCI pull-cache can exceed the runner's default free space mid-build.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/akihitomamiya-del/plasmid-clone-validation

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~25-30 GB on the hosted runner (default ~14 GB free is too little for SIF baking).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/build/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
